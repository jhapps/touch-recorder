<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <title>Page not found — Touch Recorder</title>
  <link rel="icon" type="image/png" sizes="512x512" href="/touch-recorder/play_store_512.png">
  <style>
    :root {
      --bg: #0f1115;
      --card: #1a1d24;
      --text: #e6e8eb;
      --muted: #8a91a0;
      --accent: #4f8cff;
      --border: #262a33;
    }
    @media (prefers-color-scheme: light) {
      :root {
        --bg: #f5f6f8;
        --card: #ffffff;
        --text: #1a1d24;
        --muted: #5a6270;
        --accent: #1f6feb;
        --border: #e1e4e8;
      }
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      line-height: 1.5;
      text-align: center;
    }
    main { max-width: 420px; }
    .code {
      font-size: 4.5rem;
      font-weight: 700;
      letter-spacing: -0.04em;
      color: var(--accent);
      margin: 0 0 0.5rem;
      line-height: 1;
    }
    h1 {
      margin: 0 0 0.75rem;
      font-size: 1.4rem;
    }
    p {
      margin: 0 0 2rem;
      color: var(--muted);
    }
    a.btn {
      display: inline-block;
      padding: 0.85rem 1.5rem;
      background: var(--accent);
      color: #fff;
      text-decoration: none;
      border-radius: 10px;
      font-weight: 600;
      transition: transform 0.12s ease, opacity 0.12s ease;
    }
    a.btn:hover { transform: translateY(-1px); opacity: 0.92; }
  </style>
</head>
<body>
<main>
  <div class="code">404</div>
  <h1>Page not found</h1>
  <p>The page you are looking for doesn't exist or has been moved.</p>
  <a class="btn" href="/touch-recorder/">Back to Touch Recorder</a>
</main>
</body>
</html>
