<!DOCTYPE html>                                                                                            
  <html lang="en">                                                                                           
  <head>                                                                                                     
  <meta charset="UTF-8">                                                                                     
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="index, follow">
  <title>Touch Recorder — Legal</title>                                                                      
  <style>
    :root {                                                                                                  
      --bg: #0f1115;                                                                                         
      --card: #1a1d24;
      --text: #e6e8eb;                                                                                       
      --muted: #8a91a0;                                                                                      
      --accent: #4f8cff;
      --border: #262a33;                                                                                     
    }                                                       
    @media (prefers-color-scheme: light) {                                                                   
      :root {                                                                                                
        --bg: #f5f6f8;
        --card: #ffffff;                                                                                     
        --text: #1a1d24;                                    
        --muted: #5a6270;                                                                                    
        --accent: #1f6feb;
        --border: #e1e4e8;                                                                                   
      }                                                                                                      
    }
    * { box-sizing: border-box; }                                                                            
    body {                                                  
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial,
  sans-serif;                                                                                                
      background: var(--bg);
      color: var(--text);                                                                                    
      min-height: 100vh;                                    
      display: flex;                                                                                         
      align-items: center;                                  
      justify-content: center;
      padding: 1.5rem;
      line-height: 1.5;                                                                                      
    }
    main {                                                                                                   
      width: 100%;                                          
      max-width: 480px;
    }                                                                                                        
    header {
      text-align: center;                                                                                    
      margin-bottom: 2rem;                                  
    }
    header h1 {
      margin: 0 0 0.4rem;
      font-size: 1.6rem;                                                                                     
      letter-spacing: -0.01em;
    }                                                                                                        
    header p {                                              
      margin: 0;                                                                                             
      color: var(--muted);
      font-size: 0.95rem;                                                                                    
    }                                                       
    .links {
      display: grid;
      gap: 0.75rem;
    }                                                                                                        
    .link-card {
      display: flex;                                                                                         
      align-items: center;                                  
      justify-content: space-between;
      padding: 1.1rem 1.25rem;
      background: var(--card);                                                                               
      border: 1px solid var(--border);
      border-radius: 12px;                                                                                   
      text-decoration: none;                                
      color: var(--text);
      transition: transform 0.12s ease, border-color 0.12s ease;                                             
    }
    .link-card:hover,                                                                                        
    .link-card:focus-visible {                              
      border-color: var(--accent);                                                                           
      transform: translateY(-1px);
      outline: none;                                                                                         
    }                                                       
    .link-card .label {
      display: flex;                                                                                         
      flex-direction: column;
    }                                                                                                        
    .link-card .label strong {                              
      font-size: 1rem;                                                                                       
      font-weight: 600;
    }                                                                                                        
    .link-card .label span {                                
      font-size: 0.85rem;
      color: var(--muted);                                                                                   
    }
    .link-card .arrow {                                                                                      
      color: var(--accent);                                 
      font-size: 1.2rem;
    }                                                                                                        
    footer {
      margin-top: 2.5rem;                                                                                    
      text-align: center;                                   
      color: var(--muted);
      font-size: 0.8rem;
    }                                                                                                        
    footer a {
      color: var(--muted);                                                                                   
      text-decoration: underline;                           
    }
  </style>                                                                                                   
  </head>
  <body>                                                                                                     
  <main>                                                    
    <header>
      <h1>Touch Recorder</h1>
      <p>Legal documents and contact</p>
    </header>                                                                                                
  
    <nav class="links">                                                                                      
      <a class="link-card" href="privacy.html">             
        <span class="label">
          <strong>Privacy Policy</strong>                                                                    
          <span>How we handle your data</span>
        </span>                                                                                              
        <span class="arrow" aria-hidden="true">&rsaquo;</span>
      </a>                                                                                                   
      <a class="link-card" href="terms.html">
        <span class="label">                                                                                 
          <strong>Terms of Service</strong>                                                                  
          <span>Rules for using the app</span>
        </span>                                                                                              
        <span class="arrow" aria-hidden="true">&rsaquo;</span>                                               
      </a>
      <a class="link-card" href="mailto:jhapps.touchrepeat@gmail.com">                                       
        <span class="label">                                                                                 
          <strong>Contact Support</strong>
          <span>jhapps.touchrepeat@gmail.com</span>                                                          
        </span>                                             
        <span class="arrow" aria-hidden="true">&rsaquo;</span>                                               
      </a>                                                                                                   
    </nav>
                                                                                                             
    <footer>                                                
      &copy; <span id="year">2026</span> J&amp;H Apps. All rights reserved.
    </footer>                                                                                                
  </main>
  <script>                                                                                                   
    document.getElementById('year').textContent = new Date().getFullYear();
  </script>                                                                                                  
  </body>
  </html>
